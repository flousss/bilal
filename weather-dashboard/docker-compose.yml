version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: weather-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
      PORT: 5000
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:3000
    networks:
      - weather-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: weather-frontend
    restart: always
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - weather-network

networks:
  weather-network:
    driver: bridge
