version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: rma-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: rma-portal
    volumes:
      - mongodb_data:/data/db
    networks:
      - rma-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rma-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/rma-portal
      PORT: 5000
      NODE_ENV: production
    depends_on:
      - mongodb
    networks:
      - rma-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rma-frontend
    restart: always
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - rma-network

volumes:
  mongodb_data:

networks:
  rma-network:
    driver: bridge
